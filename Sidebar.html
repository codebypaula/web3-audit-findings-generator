<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/solidity.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/typescript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>

  <style>
    :root {
      --hashlock-green: #00c0a3;
      --bg-light: #f4f7f6;
      --text-dark: #2d3436;
      --border-radius: 8px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-light);
      color: var(--text-dark);
      padding: 15px;
      margin: 0;
    }

    /* Tooltip & Header Styles */
    .header-with-info {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    h3 {
      font-weight: 600;
      color: var(--hashlock-green);
      margin: 0;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }


    .info-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background-color: #dfe6e9;
      color: #636e72;
      font-size: 11px;
      font-weight: bold;
      text-decoration: none;
      transition: all 0.2s ease;
      border: 1px solid #ced4da;
      position: relative;
      /* Necessário para o balão imediato */
    }

    .info-link:hover {
      background-color: var(--hashlock-green);
      color: white;
      border-color: var(--hashlock-green);
      box-shadow: 0 2px 4px rgba(0, 192, 163, 0.2);
    }

    /* Section Cards */
    .section-card {
      background: white;
      padding: 15px;
      border-radius: var(--border-radius);
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      border-left: 4px solid var(--hashlock-green);
      margin-bottom: 10px;
    }

    /* Result Status Box (Middle) */
    #result {
      margin: 15px 0;
      padding: 12px;
      font-size: 13px;
      background: #fff;
      border-radius: 6px;
      color: #636e72;
      min-height: 18px;
      white-space: pre-wrap;
      transition: all 0.3s ease;
      border-left: 4px solid #dfe6e9;
    }

    textarea {
      width: 100%;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 10px;
      border: 1px solid #dfe6e9;
      border-radius: 6px;
      background-color: #fafafa;
      resize: vertical;
    }

    textarea:focus {
      outline: none;
      border-color: var(--hashlock-green);
    }

    .button-group {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      flex: 1;
      background-color: var(--hashlock-green);
      color: white;
      border: none;
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: transform 0.1s, background-color 0.2s, box-shadow 0.2s;
    }

    button:hover {
      background-color: #00a88f;
      box-shadow: 0 2px 8px rgba(0, 192, 163, 0.3);
    }

    button:active {
      transform: scale(0.98);
    }

    button.secondary {
      background-color: transparent;
      border: 1.5px solid var(--hashlock-green);
      color: var(--hashlock-green);
    }

    button.secondary:hover {
      background-color: rgba(0, 192, 163, 0.05);
    }
  </style>
</head>

<body>

  <div class="header-with-info">
    <h3>Markdown Findings</h3>
    <a href="https://www.notion.so/hashlock/Audit-Tool-User-Guide-3338b7236c6f80a68810e5427ba4a016?source=copy_link"
      target="_blank" class="info-link" title="Open Documentation">i</a>
  </div>
  <textarea id="markdownInput" placeholder="Paste markdown findings here..." style="height: 180px;"></textarea>
  <div class="button-group">
    <button class="secondary" onclick="validateMarkdown()">Validate</button>
    <button onclick="writeMarkdown()">Write Markdown</button>
  </div>
  </div>

  <div id="result"></div>

  <div class="section-card">
    <div class="header-with-info">
      <h3>Scope Contracts</h3>
    </div>
    <textarea id="contractsInput" placeholder="contract1.sol&#10;contract2.sol" style="height: 80px;"></textarea>
    <button onclick="writeContracts()" style="width: 100%; margin-top: 10px;">Write Contracts</button>
  </div>

  <script>
    var HLJS_COLORS = {
      'hljs-keyword': 'rgb(0, 0, 255)', 'hljs-literal': 'rgb(0, 0, 255)', 'hljs-comment': 'rgb(0, 128, 0)',
      'hljs-string': 'rgb(163, 21, 21)', 'hljs-number': 'rgb(9, 136, 90)', 'hljs-title': 'rgb(163, 21, 21)'
    };

    var SOLIDITY_KEYWORDS = ['function', 'modifier', 'event', 'struct', 'mapping', 'contract', 'returns', 'emit', 'require', 'revert', 'public', 'private', 'external', 'internal', 'view', 'pure'];

    function setResult(message) {
      const res = document.getElementById('result');
      res.innerText = message;
      res.style.borderLeft = "4px solid #00c0a3";
      res.style.backgroundColor = "#f0fdfa";
      res.style.color = "#2d3436";
    }

    function setError(err) {
      const res = document.getElementById('result');
      res.innerText = 'Error: ' + (err.message || JSON.stringify(err));
      res.style.borderLeft = "4px solid #ff7675";
      res.style.backgroundColor = "#fff5f5";
      res.style.color = "#d63031";
    }

    function normalizeMarkdownSeverity(name) {
      var c = String(name || '').trim().toLowerCase();
      if (c === 'high') return 'High';
      if (c === 'medium') return 'Medium';
      if (c === 'low') return 'Low';
      if (c === 'gas') return 'Gas';
      if (c === 'qa') return 'QA'; // Correção aqui
      return '';
    }

    /* ... Lógica de Parsing e Highlight original (preservada) ... */
    function highlightCode(code, language) {
      var lang = (language || '').trim().toLowerCase();
      var hljsLang = (lang === 'solidity' || lang === 'sol') ? 'javascript' : lang;
      var highlighted;
      try {
        var result = (hljsLang && hljs.getLanguage(hljsLang)) ? hljs.highlight(code, { language: hljsLang }) : hljs.highlightAuto(code);
        highlighted = result.value.replace(/<span class="([^"]+)">/g, function (match, classes) {
          var classList = classes.trim().split(/\s+/);
          for (var i = 0; i < classList.length; i++) {
            var color = HLJS_COLORS[classList[i]];
            if (color) return '<span style="color: ' + color + ';">';
          }
          return '<span>';
        });
      } catch (e) { highlighted = code; }
      return '<pre><code>' + highlighted + '</code></pre>';
    }

    function parseMarkdownFindings(markdown) {
      const lines = markdown.split('\n');
      const findings = [];
      let currentSeverity = '', currentFinding = null, currentSection = '';

      lines.forEach(line => {
        const sevMatch = line.match(/^##\s+(High|Medium|Low|Gas|QA)\s*$/i);
        if (sevMatch) {
          if (currentFinding) findings.push(currentFinding);
          currentSeverity = normalizeMarkdownSeverity(sevMatch[1]);
          currentFinding = null;
          return;
        }
        const findMatch = line.match(/^###\s+\[(.+?)\]\s+(.+?)\s*$/);
        if (findMatch) {
          if (currentFinding) findings.push(currentFinding);
          currentFinding = { severity: currentSeverity, id: findMatch[1], title: findMatch[2], description: '', vulnerability_details: '', proof_of_concept: '', impact: '', recommendation: '', status: '' };
          return;
        }
        const secMatch = line.match(/^####\s+(.+?)\s*$/);
        if (secMatch && currentFinding) {
          const map = { 'description': 'description', 'vulnerability details': 'vulnerability_details', 'proof of concept': 'proof_of_concept', 'impact': 'impact', 'recommendation': 'recommendation', 'status': 'status' };
          currentSection = map[secMatch[1].toLowerCase()] || '';
          return;
        }
        if (currentFinding && currentSection) {
          currentFinding[currentSection] += (currentFinding[currentSection] ? '\n' : '') + line;
        }
      });
      if (currentFinding) findings.push(currentFinding);
      return findings;
    }

    function validateMarkdown() {
      setResult('Validating...');
      google.script.run.withSuccessHandler(setResult).withFailureHandler(setError).validateMarkdownText(document.getElementById('markdownInput').value);
    }

    function writeMarkdown() {
      var raw = document.getElementById('markdownInput').value;
      setResult('Processing...');
      try {
        var findings = parseMarkdownFindings(raw).map(f => {
          ['description', 'vulnerability_details', 'proof_of_concept', 'impact', 'recommendation'].forEach(k => {
            if (f[k]) f[k] = f[k].replace(/```([a-zA-Z0-9_-]*)\n?([\s\S]*?)```/g, (m, l, c) => highlightCode(c.trim(), l));
          });
          return f;
        });
        google.script.run.withSuccessHandler(setResult).withFailureHandler(setError).writeFindingsToReport(JSON.stringify(findings));
      } catch (e) { setError(e); }
    }

    function writeContracts() {
      setResult('Writing scope...');
      google.script.run.withSuccessHandler(setResult).withFailureHandler(setError).writeContracts(document.getElementById('contractsInput').value);
    }
  </script>
</body>

</html>
